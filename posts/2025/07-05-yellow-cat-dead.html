<p>上午10点左右，养了一年多的温驯母猫亡于底层楼道至厕所的过道处，葬于核桃树下，黄猫留下5只1个月大的小猫：两只黑白混色兼部分黄色猫、两只黑猫、一只黄猫。不知什么原因猫亡，估计是肠胃问题，没有很好的预防、及时就医。<br>愿它于天堂安息。</p>
